<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Sentinel</title>

    <!-- 1. Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- 2. Material Symbols (Icons) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <!-- 3. Tailwind CSS Compiler -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- 4. Tailwind Custom Theme Config -->
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline": "#767683", "on-primary-fixed-variant": "#3a4859", "surface-container-low": "#f3f4f5", "error": "#ba1a1a",
              "surface-container-highest": "#e1e3e4", "secondary-container": "#c2dcff", "on-tertiary-fixed": "#002108",
              "tertiary-fixed-dim": "#3ce36a", "primary-fixed": "#d6e4f9", "surface-bright": "#f8f9fa", "tertiary-fixed": "#69ff87",
              "on-error": "#ffffff", "on-surface": "#191c1d", "background": "#f8f9fa", "tertiary-container": "#003912",
              "inverse-surface": "#2e3132", "primary": "#0e1c2b", "on-error-container": "#93000a", "on-secondary": "#ffffff",
              "primary-fixed-dim": "#bac8dc", "on-secondary-container": "#48617e", "on-secondary-fixed-variant": "#2f4865",
              "surface-tint": "#525f71", "primary-container": "#233141", "surface-dim": "#d9dadb", "secondary-fixed": "#d1e4ff",
              "on-tertiary-fixed-variant": "#00531e", "surface-container": "#edeeef", "surface-container-lowest": "#ffffff",
              "on-tertiary-container": "#00b048", "inverse-primary": "#bac8dc", "outline-variant": "#c6c5d4",
              "on-surface-variant": "#454652", "inverse-on-surface": "#f0f1f2", "on-primary-container": "#8b99ac",
              "on-secondary-fixed": "#001d36", "on-background": "#191c1d", "surface-variant": "#e1e3e4", "error-container": "#ffdad6",
              "surface": "#f8f9fa", "surface-container-high": "#e7e8e9", "secondary-fixed-dim": "#afc9ea", "secondary": "#47607e",
              "on-tertiary": "#ffffff", "on-primary-fixed": "#0f1c2c", "on-primary": "#ffffff", "tertiary": "#002108"
            },
            fontFamily: {
              "headline": ["Manrope", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" }
          }
        }
      }
    </script>

    <!-- 5. Custom Animation Styles -->
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
      .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
      .hero-gradient { background: linear-gradient(135deg, #0e1c2b 0%, #233141 100%); }
      .radar-pulse { animation: radar-ping 4s cubic-bezier(0, 0, 0.2, 1) infinite; }
      .safety-pulse::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border-radius: 50%; background-color: #3ce36a; opacity: 0.3; }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      .emergency-pulse { box-shadow: 0 0 0 0 rgba(186, 26, 26, 0.4); animation: pulse 2s infinite; }
      .emergency-glow { animation: emergency-glow 2s infinite alternate; }
      
      @keyframes radar-ping { 75%, 100% { transform: scale(2); opacity: 0; } }
      @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(186, 26, 26, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(186, 26, 26, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(186, 26, 26, 0); } }
      @keyframes emergency-glow { from { box-shadow: 0 0 5px #ba1a1a; } to { box-shadow: 0 0 20px #ba1a1a; } }
      @keyframes dash { to { stroke-dashoffset: -1000; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
