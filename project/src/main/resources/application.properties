spring.application.name=project
# Cloud hosts (Render, Fly, Railway) set PORT; local default 8081
server.port=${PORT:8081}

# Browser origins allowed to call this API (comma-separated). Override when you add more frontends.
cors.allowed-origins=https://safesphere-guardian.netlify.app,http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173
spring.data.mongodb.uri=${mongo_db}

spring.ai.google.genai.api-key=${gemini_Key}
spring.ai.google.genai.chat.options.model=gemini-flash-latest
apify.api.token=${apify_key}

